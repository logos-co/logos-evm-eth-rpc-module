d_header('content-length', str(len(body)))\n        self.end_headers()\n        self.wfile.write(body)\n    def log_message(self, *a): pass\nhttp.server.HTTPServer(('127.0.0.1', 8599), H).serve_forever()\n```", "execs": [{"kind": "file", "cmd": "write mock_node.py", "status": "pass", "note": "Wrote mock_node.py"}]}, {"md": "### 3.2 Start the mock node\n\n```bash\npython3 mock_node.py &\n```", "execs": [{"kind": "run", "cmd": "sh -c 'python3 mock_node.py > mock.log 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "## Step 4: Run the daemon and drive the client", "execs": []}, {"md": "### 4.1 Write the chain configs\n\nTwo chains: chain 1 points at the mock node with no proxy required;\nchain 9 **requires** a proxy but is given none \u2014 so it must fail closed.\n\n```json\n{ \"endpoint\": \"http://127.0.0.1:8599\", \"proxyRequired\": false }\n```", "execs": [{"kind": "file", "cmd": "write chain_ok.json", "status": "pass", "note": "Wrote chain_ok.json"}]}, {"md": "### 4.2 Write the fail-closed chain config\n\n```json\n{ \"endpoint\": \"http://127.0.0.1:8599\", \"proxyRequired\": true }\n```", "execs": [{"kind": "file", "cmd": "write chain_fc.json", "status": "pass", "note": "Wrote chain_fc.json"}]}, {"md": "### 4.3 Start the daemon\n\n```bash\nlogoscore -D -m ./modules > logs.txt &\n```", "execs": [{"kind": "run", "cmd": "sh -c './logos/bin/logoscore -D -m ./modules > logs.txt 2>&1 &'", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "```bash\nsleep 3\n```", "execs": [{"kind": "run", "cmd": "sleep 3", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.4 Load the module\n\n```bash\n./logos/bin/logoscore load-module eth_rpc_module\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore load-module eth_rpc_module", "status": "pass", "exit_code": 0, \":\"eth_rpc_module\",\"result\":\"{\\\"ok\\\":true,\\\"result\\\":\\\"0x1234\\\"}\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.9 Configure chain 9 (proxy REQUIRED, none available)\n\n```bash\n./logos/bin/logoscore call eth_rpc_module set_chain_config 9 @chain_fc.json\n```", "execs": [{"kind": "run", "cmd": "./logos/bin/logoscore call eth_rpc_module set_chain_config 9 @chain_fc.json", "status": "pass", "exit_code": 0, "output": "{\"method\":\"set_chain_config\",\"module\":\"eth_rpc_module\",\"result\":true,\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.10 Fail-closed: the request is refused\n\nChain 9 requires a proxy but none is configured, so the module refuses\nto send the request in the clear \u2014 the wallet's privacy guarantee.\n\n```bash\nlogoscore call eth_rpc_module get_balance 9 <address>\n```", "execs": [{"kind": "run", "cmd": "for i in 1 2 3 4 5 6; do\n  out=$(./logos/bin/logoscore call eth_rpc_module get_balance 9 f39fd6e51aad88f6f4ce6ab8827279cfffb92266 2>&1)\n  case \"$out\" in *RPC_FAILED*) sleep 3 ;; *) break ;; esac\ndone\nprintf '%s\\n' \"$out\"\n", "status": "pass", "exit_code": 0, "output": "{\"method\":\"get_balance\",\"module\":\"eth_rpc_module\",\"result\":\"{\\\"error\\\":\\\"proxy: proxy required but none configured (fail-closed: refusing to send in the clear)\\\",\\\"ok\\\":false}\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "### 4.11 Stop the daemon and the mock node\n\n```bash\ntrap '' TERM\n./logos/bin/logoscore stop || true\npkill -f mock_node.py 2>/dev/null || true\ntrue\n\n```", "execs": [{"kind": "run", "cmd": "trap '' TERM\n./logos/bin/logoscore stop || true\npkill -f mock_node.py 2>/dev/null || true\ntrue\n", "status": "pass", "exit_code": 0, "output": "{\"message\":\"Daemon shutting down.\",\"status\":\"ok\"}\n", "note": ""}]}, {"md": "```bash\nsleep 2\n```", "execs": [{"kind": "run", "cmd": "sleep 2", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.12 Confirm the daemon has stopped\n     `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
</body>
</html>
